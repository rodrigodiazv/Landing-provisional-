<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FlowSuite - Tu equipo digital 24/7. Automatiza ventas y citas para que tú hagas lo que amas. ROI en 30 días.">
  <meta name="keywords" content="automatización ventas, agentes IA, leads 24/7, PYMEs, autónomos, Suiza">
  <meta property="og:title" content="FlowSuite | Tu equipo digital. Tu libertad creativa.">
  <meta property="og:description" content="Automatiza la venta. Multiplica tu impacto sin multiplicar tu stress.">
  <meta property="og:image" content="logo.png">
  <title>FlowSuite | Automatiza ventas. Recupera tu tiempo. Multiplica tu impacto.</title>
  <link rel="icon" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-dark: #03040A;
      --bg-surface: #0A0F1E;
      --neon-teal: #00FFB2;
      --neon-purple: #7C3AED;
      --neon-pink: #FF2D6B;
      --text-white: #FFFFFF;
      --text-secondary: rgba(255,255,255,0.65);
      --text-muted: rgba(255,255,255,0.4);
      --border-neon: rgba(0,255,178,0.15);
    }

    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #0F1428 100%);
      color: var(--text-white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== TYPOGRAPHY ===== */
    h1, h2, h3, h4, h5, h6 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
    h1 { font-size: clamp(2.8rem, 6vw, 4.8rem); line-height: 1.1; letter-spacing: -0.02em; }
    h2 { font-size: clamp(2rem, 4.5vw, 3.2rem); line-height: 1.15; }
    h3 { font-size: 1.3rem; font-weight: 600; }

    /* ===== HEADER ===== */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1rem 2rem;
      background: transparent;
      backdrop-filter: none;
      border-bottom: 1px solid transparent;
      transition: all 0.3s ease;
    }

    header.scrolled {
      background: rgba(3, 4, 10, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-neon);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
    }

    .logo-brand {
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
      color: var(--text-white);
      font-weight: 700;
      font-size: 1.4rem;
      font-family: 'Space Grotesk', sans-serif;
    }

    .logo-brand img {
      height: 50px;
      width: auto;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--neon-teal);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .lang-selector {
      display: flex;
      gap: 0.5rem;
      background: rgba(0, 255, 178, 0.08);
      border: 1px solid var(--border-neon);
      border-radius: 8px;
      padding: 0.3rem;
    }

    .lang-btn {
      padding: 0.4rem 0.8rem;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .lang-btn.active {
      background: var(--neon-teal);
      color: var(--bg-dark);
    }

    .lang-btn:hover:not(.active) {
      color: var(--neon-teal);
    }

    .burger-menu { display: none; }

    /* ===== HERO ===== */
    #hero {
      padding: 160px 2rem 100px;
      position: relative;
      overflow: hidden;
      margin-top: 20px;
    }

    #hero::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(90deg, transparent 0%, rgba(0,255,178,0.03) 50%, transparent 100%),
        repeating-linear-gradient(
          0deg,
          rgba(0,255,178,0.02) 0px,
          rgba(0,255,178,0.02) 2px,
          transparent 2px,
          transparent 4px
        );
      pointer-events: none;
      z-index: 0;
    }

    .hero-content {
      max-width: 1000px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .hero-logo-large {
      display: inline-flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .hero-logo-large img {
      height: 90px;
      width: auto;
      filter: drop-shadow(0 0 20px rgba(0,255,178,0.3));
    }

    .hero-logo-text {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(120deg, var(--neon-teal), var(--neon-purple));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(0, 255, 178, 0.1);
      border: 1px solid var(--border-neon);
      border-radius: 99px;
      padding: 0.7rem 1.4rem;
      font-size: 0.9rem;
      color: var(--neon-teal);
      margin-bottom: 2.5rem;
      font-weight: 500;
    }

    .hero-title {
      margin-bottom: 1.5rem;
    }

    .hero-title-main {
      display: block;
      color: var(--text-white);
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .hero-title-accent {
      display: block;
      background: linear-gradient(120deg, var(--neon-teal), #00D686);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: clamp(2.6rem, 7vw, 4.6rem);
      font-weight: 700;
    }

    .hero-subtitle {
      font-size: clamp(1.05rem, 2.2vw, 1.3rem);
      color: var(--text-secondary);
      max-width: 750px;
      margin: 0 auto 2.5rem;
      line-height: 1.8;
      font-weight: 400;
    }

    .hero-value-prop {
      background: linear-gradient(135deg, rgba(0,255,178,0.1), rgba(124,58,237,0.1));
      border: 1px solid var(--border-neon);
      border-radius: 14px;
      padding: 1.5rem;
      margin: 2rem auto;
      max-width: 700px;
      font-size: 1.05rem;
      color: var(--neon-teal);
      font-weight: 500;
      line-height: 1.7;
    }

    .hero-ctas {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      justify-content: center;
      margin: 2.5rem 0;
    }

    .btn {
      padding: 1.1rem 2.2rem;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'Space Grotesk', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--neon-teal), #00D686);
      color: var(--bg-dark);
      box-shadow: 0 0 40px rgba(0, 255, 178, 0.3);
    }

    .btn-primary:hover {
      box-shadow: 0 0 60px rgba(0, 255, 178, 0.5);
      transform: scale(1.03);
    }

    .btn-secondary {
      background: rgba(0, 255, 178, 0.12);
      border: 1.5px solid var(--neon-teal);
      color: var(--neon-teal);
    }

    .btn-secondary:hover {
      background: rgba(0, 255, 178, 0.25);
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 2rem;
      margin-top: 5rem;
      padding-top: 2.5rem;
      border-top: 1px solid var(--border-neon);
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      font-weight: 700;
      color: var(--neon-teal);
      font-family: 'Space Grotesk', sans-serif;
      margin-bottom: 0.7rem;
      text-shadow: 0 0 20px rgba(0, 255, 178, 0.2);
    }

    .stat-label {
      font-size: 0.95rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    /* ===== SECTIONS ===== */
    section {
      padding: 7rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    section > h2 {
      text-align: center;
      margin-bottom: 1.2rem;
    }

    .section-subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 1.2rem;
      max-width: 700px;
      margin: 0 auto 4rem;
      line-height: 1.7;
    }

    /* ===== VALUE SECTION ===== */
    #value {
      background: rgba(0, 255, 178, 0.03);
    }

    .value-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2.5rem;
      margin-top: 3rem;
    }

    .value-card {
      background: var(--bg-surface);
      border: 1.5px solid var(--border-neon);
      border-radius: 14px;
      padding: 2.5rem 2rem;
      transition: all 0.3s;
    }

    .value-card:hover {
      border-color: var(--neon-teal);
      box-shadow: 0 0 40px rgba(0, 255, 178, 0.25);
      transform: translateY(-6px);
    }

    .value-icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
    }

    .value-card h3 {
      color: var(--text-white);
      margin-bottom: 1rem;
      font-size: 1.35rem;
    }

    .value-card p {
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.7;
    }

    .value-stat {
      color: var(--neon-teal);
      font-weight: 700;
      font-size: 1.4rem;
    }

    /* ===== PROBLEM SECTION ===== */
    #problem {
      background: rgba(255, 45, 107, 0.04);
    }

    .problem-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2.5rem;
      margin-top: 3rem;
    }

    .problem-card {
      background: var(--bg-surface);
      border: 1px solid rgba(255, 45, 107, 0.2);
      border-radius: 14px;
      padding: 2.5rem 2rem;
      transition: all 0.3s;
    }

    .problem-card:hover {
      border-color: var(--neon-pink);
      box-shadow: 0 0 30px rgba(255, 45, 107, 0.15);
    }

    .problem-icon {
      font-size: 2.8rem;
      margin-bottom: 1.2rem;
    }

    .problem-card h3 {
      color: var(--text-white);
      margin-bottom: 0.8rem;
      font-size: 1.3rem;
    }

    .problem-card p {
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.7;
    }

    .problem-stat {
      color: var(--neon-pink);
      font-weight: 700;
      font-size: 1.5rem;
    }

    /* ===== ROI SECTION ===== */
    #roi {
      background: linear-gradient(135deg, rgba(0,255,178,0.08), rgba(124,58,237,0.08));
      border-radius: 20px;
      text-align: center;
    }

    .roi-box {
      background: var(--bg-surface);
      border: 1px solid var(--border-neon);
      border-radius: 16px;
      padding: 3rem 2rem;
      max-width: 600px;
      margin: 2rem auto;
    }

    .roi-title {
      color: var(--neon-teal);
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .roi-number {
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--neon-teal);
      margin: 1rem 0;
      font-family: 'Space Grotesk', sans-serif;
      text-shadow: 0 0 30px rgba(0, 255, 178, 0.3);
    }

    .roi-text {
      font-size: 1.1rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }

    /* ===== HOW IT WORKS ===== */
    #how-works {
      background: rgba(124, 58, 237, 0.03);
    }

    .timeline {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 2.5rem;
      margin-top: 3rem;
    }

    .timeline-step {
      background: var(--bg-surface);
      border: 1px solid var(--border-neon);
      border-radius: 14px;
      padding: 2.5rem 2rem;
      position: relative;
      text-align: center;
    }

    .timeline-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-teal));
      border-radius: 50%;
      font-weight: 700;
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      color: var(--bg-dark);
      box-shadow: 0 0 30px rgba(0, 255, 178, 0.2);
    }

    .timeline-step h3 {
      margin-bottom: 0.8rem;
      font-size: 1.3rem;
    }

    .timeline-step p {
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.7;
    }

    /* ===== DEMOS SECTION ===== */
    #demos {
      background: rgba(0, 255, 178, 0.02);
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.8rem;
      margin-top: 3rem;
    }

    .demo-card {
      background: var(--bg-surface);
      border: 1.5px solid var(--border-neon);
      border-radius: 14px;
      padding: 2.2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .demo-card:hover {
      border-color: var(--neon-teal);
      box-shadow: 0 0 50px rgba(0, 255, 178, 0.3);
      transform: translateY(-6px);
    }

    .demo-icon {
      font-size: 3.5rem;
      margin-bottom: 1.2rem;
    }

    .demo-card h3 {
      color: var(--text-white);
      margin-bottom: 0.6rem;
      font-size: 1.3rem;
    }

    .demo-card p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .demo-btn {
      display: inline-block;
      padding: 0.7rem 1.4rem;
      background: rgba(0, 255, 178, 0.15);
      border: 1px solid var(--neon-teal);
      color: var(--neon-teal);
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.2s;
      font-size: 0.95rem;
    }

    .demo-btn:hover {
      background: rgba(0, 255, 178, 0.3);
      box-shadow: 0 0 20px rgba(0, 255, 178, 0.2);
    }

    /* ===== TESTIMONIALS ===== */
    #testimonials {
      background: rgba(0, 255, 178, 0.02);
    }

    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 3rem;
    }

    .testimonial {
      background: var(--bg-surface);
      border: 1px solid var(--border-neon);
      border-radius: 14px;
      padding: 2.2rem;
    }

    .testimonial-text {
      font-style: italic;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      line-height: 1.8;
      font-size: 1rem;
    }

    .testimonial-author {
      font-weight: 700;
      color: var(--neon-teal);
      font-size: 0.95rem;
    }

    /* ===== PRICING SECTION ===== */
    #pricing {
      background: rgba(124, 58, 237, 0.02);
    }

    .pricing-note {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 3rem;
      padding: 1.2rem;
      background: rgba(0, 255, 178, 0.08);
      border-left: 3px solid var(--neon-teal);
      border-radius: 8px;
    }

    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2.5rem;
      margin-top: 3rem;
    }

    .price-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-neon);
      border-radius: 14px;
      padding: 2.5rem;
      position: relative;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
    }

    .price-card.popular {
      border-color: var(--neon-teal);
      box-shadow: 0 0 50px rgba(0, 255, 178, 0.25);
      transform: scale(1.03);
    }

    .price-badge {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--neon-teal), var(--neon-purple));
      color: var(--bg-dark);
      padding: 0.5rem 1.2rem;
      border-radius: 24px;
      font-weight: 700;
      font-size: 0.85rem;
      box-shadow: 0 0 20px rgba(0, 255, 178, 0.3);
    }

    .price-name {
      font-size: 1.5rem;
      color: var(--text-white);
      margin-bottom: 0.5rem;
      margin-top: 1.2rem;
      font-weight: 700;
    }

    .price-amount {
      font-size: 3rem;
      font-weight: 700;
      color: var(--neon-teal);
      margin-bottom: 0.3rem;
      font-family: 'Space Grotesk', sans-serif;
      text-shadow: 0 0 20px rgba(0, 255, 178, 0.2);
    }

    .price-period {
      color: var(--text-secondary);
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    .price-features {
      list-style: none;
      margin-bottom: 2.5rem;
      flex: 1;
    }

    .price-features li {
      padding: 0.8rem 0;
      color: var(--text-secondary);
      font-size: 0.98rem;
      border-bottom: 1px solid rgba(0, 255, 178, 0.1);
      line-height: 1.6;
    }

    .price-features li::before {
      content: '✓ ';
      color: var(--neon-teal);
      font-weight: 700;
      margin-right: 0.6rem;
    }

    .price-features li:last-child {
      border-bottom: none;
    }

    .price-cta {
      padding: 1rem 1.8rem;
      background: rgba(0, 255, 178, 0.15);
      border: 1px solid var(--neon-teal);
      color: var(--neon-teal);
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      font-size: 1rem;
    }

    .price-cta:hover {
      background: rgba(0, 255, 178, 0.3);
    }

    .price-card.popular .price-cta {
      background: linear-gradient(135deg, var(--neon-teal), #00D686);
      color: var(--bg-dark);
      border: none;
      box-shadow: 0 0 30px rgba(0, 255, 178, 0.3);
    }

    .price-card.popular .price-cta:hover {
      box-shadow: 0 0 50px rgba(0, 255, 178, 0.5);
    }

    /* ===== CONTACT SECTION ===== */
    #contact {
      background: rgba(0, 255, 178, 0.03);
    }

    .contact-wrapper {
      max-width: 650px;
      margin: 0 auto;
    }

    .form-group {
      margin-bottom: 1.8rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.6rem;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 1rem;
      background: var(--bg-surface);
      border: 1px solid var(--border-neon);
      border-radius: 10px;
      color: var(--text-white);
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      font-size: 1rem;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--neon-teal);
      box-shadow: 0 0 20px rgba(0, 255, 178, 0.2);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 140px;
    }

    .form-checkbox {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1.8rem;
      padding: 1.2rem;
      background: rgba(0, 255, 178, 0.08);
      border: 1px solid var(--border-neon);
      border-radius: 10px;
    }

    .form-checkbox input[type="checkbox"] {
      width: 22px;
      height: 22px;
      margin-top: 0.2rem;
      cursor: pointer;
      accent-color: var(--neon-teal);
      flex-shrink: 0;
    }

    .form-checkbox label {
      margin: 0;
      font-size: 0.95rem;
      color: var(--text-secondary);
      cursor: pointer;
      line-height: 1.6;
    }

    .form-error {
      color: var(--neon-pink);
      font-size: 0.85rem;
      margin-top: 0.4rem;
      display: none;
    }
