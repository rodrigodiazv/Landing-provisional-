<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FlowSuite — Tu equipo digital trabaja 24/7. Capta leads, responde clientes y llena tu agenda mientras tú haces lo que mejor sabes hacer.">
  <meta property="og:title" content="FlowSuite | Tu equipo digital. Tu libertad.">
  <meta property="og:description" content="Agentes IA que captan, cualifican y cierran clientes. Sin pausas. Sin errores. Sin contratar a nadie.">
  <title>FlowSuite | Tu negocio trabaja 24/7 — aunque tú no estés</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#03040A; --bg2:#0A0F1E; --teal:#00FFB2; --purple:#7C3AED;
      --pink:#FF2D6B; --white:#FFFFFF; --sub:rgba(255,255,255,0.62);
      --muted:rgba(255,255,255,0.38); --border:rgba(0,255,178,0.13);
    }
    html{scroll-behavior:smooth;}
    body{font-family:'Inter',sans-serif;background:linear-gradient(160deg,var(--bg) 0%,#0d1225 100%);color:var(--white);line-height:1.6;overflow-x:hidden;padding-top:76px;}
    h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;font-weight:700;}

    /* ── HEADER ── */
    header{position:fixed;top:0;left:0;right:0;z-index:200;padding:0 2rem;height:76px;display:flex;align-items:center;transition:all .3s;}
    header.scrolled{background:rgba(3,4,10,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
    .header-inner{max-width:1160px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;}
    .logo-brand{display:flex;align-items:center;text-decoration:none;}
    .logo-brand img{height:42px;width:auto;display:block;}
    .nav-links{display:flex;gap:1.8rem;list-style:none;}
    .nav-links a{color:var(--sub);text-decoration:none;font-size:.92rem;font-weight:500;transition:color .2s;}
    .nav-links a:hover{color:var(--teal);}
    .header-right{display:flex;align-items:center;gap:1rem;}
    .lang-selector{display:flex;gap:.25rem;background:rgba(0,255,178,.07);border:1px solid var(--border);border-radius:8px;padding:.25rem;}
    .lang-btn{padding:.32rem .65rem;border:none;background:transparent;color:var(--sub);cursor:pointer;font-size:.72rem;font-weight:600;border-radius:6px;transition:all .18s;}
    .lang-btn.active{background:var(--teal);color:var(--bg);}
    .lang-btn:hover:not(.active){color:var(--teal);}
    .burger-menu{display:none;background:transparent;border:none;color:var(--white);font-size:1.6rem;cursor:pointer;}
    .mobile-nav{display:none;position:fixed;inset:0;background:rgba(3,4,10,.97);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:2.2rem;}
    .mobile-nav.open{display:flex;}
    .mobile-nav a{color:var(--white);text-decoration:none;font-size:1.8rem;font-weight:700;font-family:'Space Grotesk',sans-serif;}
    .mobile-nav a:hover{color:var(--teal);}
    .mobile-nav-close{position:absolute;top:1.5rem;right:2rem;background:transparent;border:none;color:var(--white);font-size:2rem;cursor:pointer;}

    /* ── BUTTONS ── */
    .btn{padding:.95rem 1.9rem;border:none;border-radius:12px;font-weight:700;font-size:.97rem;cursor:pointer;transition:all .25s;text-decoration:none;display:inline-flex;align-items:center;gap:.5rem;font-family:'Space Grotesk',sans-serif;}
    .btn-primary{background:linear-gradient(135deg,var(--teal),#00D686);color:var(--bg);box-shadow:0 0 28px rgba(0,255,178,.22);}
    .btn-primary:hover{box-shadow:0 0 46px rgba(0,255,178,.42);transform:scale(1.02);}
    .btn-secondary{background:rgba(0,255,178,.1);border:1.5px solid var(--teal);color:var(--teal);}
    .btn-secondary:hover{background:rgba(0,255,178,.2);}

    /* ── HERO ── */
    #hero{padding:130px 2rem 90px;text-align:center;position:relative;overflow:hidden;}
    #hero::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:800px;height:600px;background:radial-gradient(ellipse,rgba(0,255,178,.06) 0%,transparent 65%);pointer-events:none;}
    .hero-content{max-width:960px;margin:0 auto;position:relative;z-index:1;}
    .hero-logo-large{display:inline-flex;align-items:center;gap:1.2rem;margin-bottom:2rem;flex-wrap:wrap;justify-content:center;}
    .hero-logo-large img{height:76px;width:auto;filter:drop-shadow(0 0 18px rgba(0,255,178,.28));}
    .hero-logo-text{font-size:1.9rem;font-weight:700;background:linear-gradient(120deg,var(--teal),var(--purple));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
    .hero-badge{display:inline-flex;align-items:center;gap:.5rem;background:rgba(0,255,178,.09);border:1px solid var(--border);border-radius:99px;padding:.55rem 1.1rem;font-size:.85rem;color:var(--teal);margin-bottom:1.8rem;font-weight:500;}
    .hero-badge::before{content:'';width:7px;height:7px;background:var(--teal);border-radius:50%;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.5;transform:scale(1.3);}}
    .hero-title-main{display:block;color:var(--white);font-size:clamp(2rem,5vw,3.8rem);font-weight:700;margin-bottom:.4rem;letter-spacing:-.02em;line-height:1.1;}
    .hero-title-accent{display:block;background:linear-gradient(120deg,var(--teal),#00D686);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-size:clamp(2.2rem,5.5vw,4.2rem);font-weight:700;letter-spacing:-.02em;line-height:1.1;margin-bottom:1.5rem;}
    .hero-subtitle{font-size:clamp(.98rem,1.8vw,1.15rem);color:var(--sub);max-width:660px;margin:0 auto 1.8rem;line-height:1.8;font-weight:300;}
    .hero-value-prop{background:linear-gradient(135deg,rgba(0,255,178,.07),rgba(124,58,237,.07));border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.4rem;margin:1.5rem auto;max-width:640px;font-size:.97rem;color:var(--teal);font-weight:500;line-height:1.6;}
    .hero-ctas{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;margin:1.8rem 0;}
    .hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:3.5rem;padding-top:2.2rem;border-top:1px solid var(--border);max-width:520px;margin-left:auto;margin-right:auto;}
    .stat-value{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;color:var(--teal);font-family:'Space Grotesk',sans-serif;margin-bottom:.4rem;}
    .stat-label{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:500;}

    /* ── SECTIONS ── */
    section{padding:5.5rem 2rem;max-width:1160px;margin:0 auto;}
    .section-label{display:inline-block;font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:.8rem;}
    section > h2{text-align:center;margin-bottom:1rem;font-size:clamp(1.8rem,3.5vw,2.6rem);letter-spacing:-.02em;}
    .section-subtitle{text-align:center;color:var(--sub);font-size:1.05rem;max-width:640px;margin:0 auto 3rem;line-height:1.75;font-weight:300;}

    /* ── TRUST STRIP ── */
    #trust{max-width:100%;padding:2.8rem 2rem;background:linear-gradient(135deg,rgba(0,255,178,.04),rgba(124,58,237,.04));border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
    .trust-inner{max-width:860px;margin:0 auto;text-align:center;}
    .trust-inner h2{font-size:1.3rem;margin-bottom:1.2rem;}
    .trust-badges{display:flex;flex-wrap:wrap;gap:.8rem;justify-content:center;margin-bottom:.8rem;}
    .trust-badge-item{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1rem;background:rgba(0,255,178,.07);border:1px solid var(--border);border-radius:8px;color:var(--teal);font-size:.85rem;font-weight:500;}

    /* ── VALUE ── */
    #value{background:rgba(0,255,178,.015);}
    .value-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:1.8rem;margin-top:2.5rem;}
    .value-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:2rem 1.8rem;transition:all .3s;}
    .value-card:hover{border-color:var(--teal);box-shadow:0 0 32px rgba(0,255,178,.18);transform:translateY(-4px);}
    .value-icon{font-size:2.4rem;margin-bottom:1rem;}
    .value-card h3{color:var(--white);margin-bottom:.7rem;font-size:1.15rem;}
    .value-card p{color:var(--sub);font-size:.93rem;line-height:1.7;}

    /* ── PROBLEM ── */
    #problem{background:rgba(255,45,107,.025);}
    .problem-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:1.8rem;margin-top:2.5rem;}
    .problem-card{background:var(--bg2);border:1px solid rgba(255,45,107,.16);border-radius:14px;padding:2rem 1.8rem;transition:all .3s;}
    .problem-card:hover{border-color:var(--pink);box-shadow:0 0 24px rgba(255,45,107,.1);}
    .problem-icon{font-size:2.4rem;margin-bottom:1rem;}
    .problem-card h3{color:var(--white);margin-bottom:.7rem;font-size:1.15rem;}
    .problem-card p{color:var(--sub);font-size:.93rem;line-height:1.7;}
    .problem-stat{color:var(--pink);font-weight:700;font-size:1.5rem;margin-top:.8rem;font-family:'Space Grotesk',sans-serif;}

    /* ── ROI ── */
    #roi{background:linear-gradient(135deg,rgba(0,255,178,.055),rgba(124,58,237,.055));border-radius:20px;text-align:center;}
    .roi-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem;max-width:520px;margin:2rem auto;}
    .roi-label{color:var(--teal);font-size:1rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.8rem;font-weight:600;}
    .roi-number{font-size:3rem;font-weight:700;color:var(--teal);font-family:'Space Grotesk',sans-serif;text-shadow:0 0 24px rgba(0,255,178,.25);margin:.8rem 0;}
    .roi-text{font-size:1rem;color:var(--sub);line-height:1.8;}

    /* ── HOW IT WORKS ── */
    #how-works{background:rgba(124,58,237,.02);}
    .timeline{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:1.8rem;margin-top:2.5rem;}
    .timeline-step{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:2rem 1.8rem;text-align:center;transition:border-color .3s;}
    .timeline-step:hover{border-color:rgba(0,255,178,.3);}
    .timeline-number{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;background:linear-gradient(135deg,var(--purple),var(--teal));border-radius:50%;font-weight:700;font-size:1.4rem;margin-bottom:1.2rem;color:var(--bg);}
    .timeline-step h3{margin-bottom:.7rem;font-size:1.1rem;}
    .timeline-step p{color:var(--sub);font-size:.92rem;line-height:1.7;}

    /* ── DEMOS ── */
    #demos{background:rgba(0,255,178,.01);}
    .demo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.4rem;margin-top:2.5rem;}
    .demo-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:1.8rem 1.5rem;text-align:center;cursor:pointer;transition:all .3s;}
    .demo-card:hover{border-color:var(--teal);box-shadow:0 0 36px rgba(0,255,178,.2);transform:translateY(-4px);}
    .demo-icon{font-size:2.8rem;margin-bottom:.9rem;}
    .demo-card h3{color:var(--white);margin-bottom:.4rem;font-size:1.1rem;}
    .demo-card p{color:var(--sub);font-size:.88rem;margin-bottom:1rem;line-height:1.5;}
    .demo-btn{display:inline-block;padding:.55rem 1.1rem;background:rgba(0,255,178,.1);border:1px solid var(--teal);color:var(--teal);border-radius:8px;font-weight:700;font-size:.86rem;transition:all .2s;}
    .demo-btn:hover{background:rgba(0,255,178,.22);}

    /* ── DEMO MODAL ── */
    .demo-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:400;align-items:center;justify-content:center;padding:1rem;}
    .demo-modal-overlay.active{display:flex;}
    .demo-modal{background:var(--bg2);border:1.5px solid var(--border);border-radius:16px;padding:2rem;max-width:560px;width:100%;position:relative;}
    .demo-modal-close{position:absolute;top:.9rem;right:1.2rem;background:transparent;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;transition:color .2s;}
    .demo-modal-close:hover{color:var(--white);}
    .demo-modal h3{font-size:1.25rem;margin-bottom:.9rem;}
    .demo-notice{color:var(--sub);font-size:.86rem;line-height:1.7;margin-bottom:1.1rem;padding:.9rem 1rem;background:rgba(0,255,178,.05);border:1px solid var(--border);border-radius:8px;}
    .demo-consent-check{display:flex;align-items:flex-start;gap:.7rem;margin-bottom:.4rem;}
    .demo-consent-check input{width:17px;height:17px;flex-shrink:0;margin-top:.15rem;accent-color:var(--teal);}
    .demo-consent-check label{font-size:.86rem;color:var(--sub);cursor:pointer;}
    .demo-consent-error{color:var(--pink);font-size:.8rem;margin:.3rem 0 .8rem;display:none;}
    .demo-iframe-wrapper{display:none;margin-top:1.2rem;}
    .demo-iframe-wrapper iframe{width:100%;height:460px;border:none;border-radius:10px;}

    /* ── TESTIMONIALS ── */
    .testimonials-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:1.8rem;margin-top:2.5rem;}
    .testimonial{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.8rem;}
    .testimonial-text{font-style:italic;color:var(--sub);margin-bottom:1rem;line-height:1.8;font-size:.94rem;}
    .testimonial-author{font-weight:700;color:var(--teal);font-size:.88rem;}

    /* ── SCARCITY ── */
    .scarcity-banner{background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(0,255,178,.1));border-top:1px solid rgba(124,58,237,.22);border-bottom:1px solid rgba(124,58,237,.22);padding:2.2rem 2rem;text-align:center;}
    .scarcity-text{font-size:1.15rem;font-weight:700;color:var(--white);margin-bottom:1.2rem;font-family:'Space Grotesk',sans-serif;}

    /* ── PRICING ── */
    .pricing-note{text-align:center;color:var(--sub);font-size:.9rem;margin:0 auto 2rem;padding:1rem 1.4rem;background:rgba(0,255,178,.06);border-left:3px solid var(--teal);border-radius:8px;max-width:680px;}
    .pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:2rem;margin-top:2rem;}
    .price-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:2rem;position:relative;transition:all .3s;display:flex;flex-direction:column;}
    .price-card.popular{border-color:var(--teal);box-shadow:0 0 36px rgba(0,255,178,.18);transform:scale(1.03);}
    .price-badge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--teal),var(--purple));color:var(--bg);padding:.38rem 1rem;border-radius:24px;font-weight:700;font-size:.8rem;white-space:nowrap;}
    .price-name{font-size:1.3rem;color:var(--white);margin-bottom:.4rem;margin-top:.9rem;font-weight:700;}
    .price-amount{font-size:2.6rem;font-weight:700;color:var(--teal);font-family:'Space Grotesk',sans-serif;margin-bottom:.2rem;}
    .price-period{color:var(--muted);font-size:.9rem;margin-bottom:1.6rem;}
    .price-features{list-style:none;margin-bottom:1.8rem;flex:1;}
    .price-features li{padding:.62rem 0;color:var(--sub);font-size:.91rem;border-bottom:1px solid rgba(0,255,178,.07);line-height:1.5;}
    .price-features li::before{content:'✓ ';color:var(--teal);font-weight:700;}
    .price-features li:last-child{border-bottom:none;}
    .price-cta{padding:.85rem 1.4rem;background:rgba(0,255,178,.1);border:1px solid var(--teal);color:var(--teal);border-radius:10px;font-weight:700;cursor:pointer;transition:all .2s;width:100%;font-size:.94rem;font-family:'Space Grotesk',sans-serif;}
    .price-cta:hover{background:rgba(0,255,178,.22);}
    .price-card.popular .price-cta{background:linear-gradient(135deg,var(--teal),#00D686);color:var(--bg);border:none;box-shadow:0 0 22px rgba(0,255,178,.22);}
    .price-card.popular .price-cta:hover{box-shadow:0 0 36px rgba(0,255,178,.4);}

    /* ── CONTACT ── */
    .contact-wrapper{max-width:600px;margin:0 auto;}
    .form-group{margin-bottom:1.4rem;}
    .form-group label{display:block;margin-bottom:.45rem;color:var(--sub);font-weight:600;font-size:.88rem;}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:.85rem 1rem;background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--white);font-family:'Inter',sans-serif;font-size:.95rem;transition:all .2s;}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 16px rgba(0,255,178,.16);}
    .form-group select option{background:var(--bg2);}
    .form-group textarea{resize:vertical;min-height:110px;}
    .form-checkbox{display:flex;align-items:flex-start;gap:.9rem;margin-bottom:1.4rem;padding:.95rem 1.1rem;background:rgba(0,255,178,.05);border:1px solid var(--border);border-radius:10px;}
    .form-checkbox input[type="checkbox"]{width:19px;height:19px;margin-top:.15rem;cursor:pointer;accent-color:var(--teal);flex-shrink:0;}
    .form-checkbox label{margin:0;font-size:.88rem;color:var(--sub);cursor:pointer;line-height:1.6;}
    .form-error{color:var(--pink);font-size:.8rem;margin-top:.3rem;display:none;}
    .form-submit-btn{width:100%;padding:1.05rem;background:linear-gradient(135deg,var(--teal),#00D686);color:var(--bg);border:none;border-radius:12px;font-weight:700;font-size:1.05rem;cursor:pointer;transition:all .3s;font-family:'Space Grotesk',sans-serif;box-shadow:0 0 26px rgba(0,255,178,.22);}
    .form-submit-btn:hover{box-shadow:0 0 42px rgba(0,255,178,.4);transform:translateY(-2px);}
    .form-or{text-align:center;color:var(--muted);margin:1.2rem 0;font-size:.92rem;}
    .form-wa-btn{display:flex;align-items:center;justify-content:center;gap:.7rem;width:100%;padding:1rem;background:rgba(37,211,102,.12);border:1.5px solid rgba(37,211,102,.45);color:#25D366;border-radius:12px;font-weight:700;font-size:.97rem;text-decoration:none;transition:all .2s;font-family:'Space Grotesk',sans-serif;}
    .form-wa-btn:hover{background:rgba(37,211,102,.25);}
    .form-success{display:none;text-align:center;padding:3rem 2rem;background:rgba(0,255,178,.06);border:1.5px solid var(--teal);border-radius:14px;}
    .form-success h3{color:var(--teal);font-size:1.7rem;margin-bottom:.8rem;}
    .form-success p{color:var(--sub);font-size:1rem;line-height:1.7;}

    /* ── FOOTER ── */
    footer{background:var(--bg2);border-top:1px solid var(--border);padding:3.5rem 2rem 2rem;}
    .footer-inner{max-width:1160px;margin:0 auto;}
    .footer-top{display:grid;grid-template-columns:2fr 1fr 1fr;gap:3rem;margin-bottom:2.5rem;}
    .footer-brand img{height:40px;margin-bottom:.9rem;}
    .footer-tagline{color:var(--sub);font-size:.88rem;line-height:1.65;margin-bottom:.9rem;}
    .footer-swiss-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.42rem .9rem;background:rgba(0,255,178,.07);border:1px solid var(--border);border-radius:8px;color:var(--teal);font-size:.82rem;font-weight:600;margin-bottom:.8rem;}
    .footer-beta-cta{display:inline-flex;align-items:center;padding:.55rem 1.1rem;background:linear-gradient(135deg,var(--teal),var(--purple));color:var(--bg);border-radius:8px;font-weight:700;font-size:.85rem;text-decoration:none;transition:all .3s;}
    .footer-beta-cta:hover{box-shadow:0 0 22px rgba(0,255,178,.28);}
    .footer-col h4{color:var(--white);font-size:.95rem;font-weight:700;margin-bottom:1rem;font-family:'Space Grotesk',sans-serif;}
    .footer-col ul{list-style:none;}
    .footer-col ul li{margin-bottom:.6rem;}
    .footer-col ul li a{color:var(--sub);text-decoration:none;font-size:.9rem;transition:color .2s;}
    .footer-col ul li a:hover{color:var(--teal);}
    .footer-bottom{border-top:1px solid var(--border);padding-top:1.8rem;}
    .footer-beta-notice{background:rgba(0,255,178,.05);border:1px solid var(--border);border-radius:8px;padding:.9rem 1.2rem;font-size:.82rem;color:var(--sub);margin-bottom:1rem;line-height:1.6;}
    .footer-legal{color:var(--muted);font-size:.7
